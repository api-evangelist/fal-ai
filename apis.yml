- type: Features
  data:
  - Unified queue-based REST API at https://queue.fal.run/{model-id} for 1,000+ generative
    models
  - Image generation models — FLUX (Schnell, Dev, Pro, Kontext Pro), Seedream V4,
    Nano Banana, Qwen, SDXL, SD3, Ideogram, Recraft
  - Video generation models — Veo 3, Kling 2.5 Turbo Pro, Wan 2.5, Seedance 2.0, Ovi,
    Hunyuan, Sora-class
  - Audio and voice models — Inworld TTS-1.5, ElevenLabs, MMAudio, MusicGen, Stable
    Audio
  - 3D and multimodal models — TripoSR, Hunyuan3D, LivePortrait, FaceChain
  - Synchronous, asynchronous queue, server-sent streaming, and WebSocket realtime
    invocation modes
  - Webhook callbacks for queue completion with HMAC signature verification
  - File uploads / CDN storage at https://v3.fal.media with signed upload URLs
  - fal Serverless — `@fal.function`, `fal.App`, BYO container deployment with autoscaling
    from 0 to thousands of GPUs
  - fal Compute — dedicated H100/H200/A100/B200 instances with SSH and per-second
    billing
  - Per-output billing (image, video second, audio minute) plus per-second GPU billing
    for custom deployments
  - 99.99% uptime SLA, SOC 2 compliance, private endpoints, and enterprise support
  - Proprietary Inference Engine — up to 10x faster than reference implementations
  - Official SDKs for Python (fal-client), JavaScript/TypeScript (@fal-ai/client),
    Swift, Java/Kotlin, Dart
  - fal CLI for serverless deploy / run / apps / secrets / auth
  - fal MCP Server exposing all 1,000+ models to AI assistants via the Model Context
    Protocol
  - ComfyUI and Blender extensions, plus Terraform provider for infra-as-code
  - Day-zero launch partner for major model releases (FLUX, Veo, Kling, Seedance,
    Wan, etc.)
  sources:
