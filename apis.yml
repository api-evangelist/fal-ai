description: fal (Features and Labels, Inc.) is a generative media platform providing
  the world's fastest API for running image, video, audio, and multimodal generative
  AI models. Through a unified queue-based REST API at https://queue.fal.run, plus
  realtime WebSocket and SSE streaming surfaces, fal serves 1,000+ production models
  — including FLUX, Veo 3, Kling, Wan, Seedream, Nano Banana, and Stable Diffusion
  — on autoscaling GPU infrastructure. fal Serverless lets developers ship custom
  models with `@fal.function` / `fal.App` / BYO containers, while fal Compute provides
  dedicated H100/H200/A100/B200 instances. Trusted by Canva, Perplexity, Poe, and
  1.5M+ developers; Series D funded ($140M, Sequoia-led, December 2025); SOC 2 with
  99.99% uptime.
