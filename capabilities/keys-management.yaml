naftiko: 1.0.0-alpha2
info:
  label: fal API Keys API — Management
  description: 'fal API Keys API — Management. Create, list, scope, and revoke API keys used to authenticate against
    fal''s Model, Storage, Serverless, and Compute APIs.'
  tags:
  - Fal
  - Administration
  - API Keys
  - Authentication
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FAL_KEY: FAL_KEY
capability:
  consumes:
  - type: http
    namespace: keys-management
    baseUri: https://rest.alpha.fal.ai
    description: fal API Keys — Management business capability.
    resources:
    - name: keys
      path: /keys
      operations:
      - name: listkeys
        method: GET
        description: List API keys for the calling organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
      - name: createkey
        method: POST
        description: Create a new API key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: key
      path: /keys/{key_id}
      operations:
      - name: revokekey
        method: DELETE
        description: Revoke an API key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key_id
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: 'Key {{env.FAL_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: keys-management-rest
    port: 8080
    description: REST adapter for fal API Keys — Management.
    resources:
    - path: /v1/keys
      name: keys
      description: REST surface for key management.
      operations:
      - method: GET
        name: listkeys
        description: List API keys.
        call: keys-management.listkeys
        outputParameters:
        - type: array
          mapping: $.
      - method: POST
        name: createkey
        description: Create an API key.
        call: keys-management.createkey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/keys/{key_id}
      name: key
      description: REST surface for a single key.
      operations:
      - method: DELETE
        name: revokekey
        description: Revoke an API key.
        call: keys-management.revokekey
        with:
          key_id: rest.path.key_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: keys-management-mcp
    port: 9090
    transport: http
    description: MCP adapter for fal API Keys — Management.
    tools:
    - name: fal-list-keys
      description: List fal API keys for the calling organization.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: keys-management.listkeys
      outputParameters:
      - type: array
        mapping: $.
    - name: fal-create-key
      description: Create a new fal API key.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: keys-management.createkey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fal-revoke-key
      description: Revoke a fal API key.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: keys-management.revokekey
      with:
        key_id: tools.key_id
      outputParameters:
      - type: object
        mapping: $.
