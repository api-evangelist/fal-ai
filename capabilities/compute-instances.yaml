naftiko: 1.0.0-alpha2
info:
  label: fal Compute API — Instances
  description: 'fal Compute API — Instances. Provision and manage dedicated GPU instances (H100, H200, A100, B200)
    with full SSH access for training, fine-tuning, and persistent workloads.'
  tags:
  - Fal
  - Compute
  - GPU
  - Dedicated
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FAL_KEY: FAL_KEY
capability:
  consumes:
  - type: http
    namespace: compute-instances
    baseUri: https://rest.alpha.fal.ai
    description: fal Compute — Instances business capability.
    resources:
    - name: instances
      path: /compute/instances
      operations:
      - name: listinstances
        method: GET
        description: List dedicated GPU instances in the calling organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
      - name: createinstance
        method: POST
        description: Provision a new dedicated GPU instance.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: 'Instance spec (gpu_type, region, ssh_key).'
    - name: instance
      path: /compute/instances/{instance_id}
      operations:
      - name: getinstance
        method: GET
        description: Retrieve an instance by id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: instance_id
          in: path
          type: string
          required: true
      - name: terminateinstance
        method: DELETE
        description: Terminate a dedicated GPU instance.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: instance_id
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: 'Key {{env.FAL_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: compute-instances-rest
    port: 8080
    description: REST adapter for fal Compute — Instances.
    resources:
    - path: /v1/compute/instances
      name: instances
      description: REST surface for instance management.
      operations:
      - method: GET
        name: listinstances
        description: List dedicated GPU instances.
        call: compute-instances.listinstances
        outputParameters:
        - type: array
          mapping: $.
      - method: POST
        name: createinstance
        description: Provision a new instance.
        call: compute-instances.createinstance
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/compute/instances/{instance_id}
      name: instance
      description: REST surface for a single instance.
      operations:
      - method: GET
        name: getinstance
        description: Get instance.
        call: compute-instances.getinstance
        with:
          instance_id: rest.path.instance_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: terminateinstance
        description: Terminate instance.
        call: compute-instances.terminateinstance
        with:
          instance_id: rest.path.instance_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: compute-instances-mcp
    port: 9090
    transport: http
    description: MCP adapter for fal Compute — Instances.
    tools:
    - name: fal-list-instances
      description: List dedicated GPU instances in the calling organization.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compute-instances.listinstances
      outputParameters:
      - type: array
        mapping: $.
    - name: fal-create-instance
      description: Provision a new dedicated GPU instance.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: compute-instances.createinstance
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fal-get-instance
      description: Get a dedicated GPU instance by id.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compute-instances.getinstance
      with:
        instance_id: tools.instance_id
      outputParameters:
      - type: object
        mapping: $.
    - name: fal-terminate-instance
      description: Terminate a dedicated GPU instance.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: compute-instances.terminateinstance
      with:
        instance_id: tools.instance_id
      outputParameters:
      - type: object
        mapping: $.
